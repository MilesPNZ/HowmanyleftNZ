<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced Search - How Many Left?</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: Arial, sans-serif; }
    .navbar { background-color: #007bff; }
    .search-form { max-width: 600px; margin: 50px auto; }
    .form-label { font-weight: 600; color: #0056b3; }
  </style>
</head>
<body>
  <!-- Navbar (consistent) -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/">How Many Left?</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="/search">Advanced Search</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="search-form">
      <h2 class="text-center mb-4">Advanced Vehicle Search</h2>
      <form action="/search" method="GET" id="searchForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Make</label>
            <select name="make" id="make" class="form-select">
              <option value="">Any Make</option>
              {% for make in makes %}
                <option value="{{ make }}">{{ make }} ({{ counts[make] }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Model</label>
            <select name="model" id="model" class="form-select" disabled>
              <option value="">Select Make First</option>
            </select>
          </div>
        </div>
        <div class="row g-3 mt-3">
          <div class="col-md-6">
            <label class="form-label">Year From</label>
            <select name="year_from" class="form-select">
              <option value="">Any Year</option>
              {% for y in range(1990, 2027) %}<option value="{{ y }}">{{ y }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Year To</label>
            <select name="year_to" class="form-select">
              <option value="">Any Year</option>
              {% for y in range(1990, 2027) %}<option value="{{ y }}" selected>{{ y }}</option>{% endfor %}
            </select>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label">Keywords (e.g. Cosworth, V8)</label>
          <input type="text" name="keywords" class="form-control" placeholder="Optional free-text search">
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-4 px-4 py-2 fs-5">Search Database</button>
      </form>
    </div>
  </div>

  <!-- Footer (consistent, same as index.html) -->
  <footer class="bg-secondary text-white py-5 mt-5">
    <!-- Paste exact footer from your index.html here -->
    <div class="container">
      <div class="row text-center text-md-start">
        <div class="col-md-4 mb-4">
          <h5 class="text-uppercase mb-3">Disclaimer</h5>
          <p class="small">This website is a hobby project... (full disclaimer as in index.html)</p>
        </div>
        <!-- Full footer content from index.html -->
      </div>
      <hr class="my-4 border-secondary">
      <div class="text-center small">© 2026 How Many Left? NZ. All rights reserved.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Dynamic Model loader
    document.getElementById('make').addEventListener('change', function() {
      const make = this.value;
      const modelSelect = document.getElementById('model');
      modelSelect.innerHTML = '<option value="">Loading...</option>';
      modelSelect.disabled = true;
      if (!make) return;
      fetch(`/models?make=${encodeURIComponent(make)}`)
        .then(r => r.json())
        .then(data => {
          modelSelect.innerHTML = '<option value="">Any Model</option>' + data.map(m => `<option value="${m}">${m} (${data.counts[m] || '?'})</option>`).join('');
          modelSelect.disabled = false;
        })
        .catch(() => modelSelect.innerHTML = '<option value="">Error loading models</option>');
    });
  </script>
</body>
</html>
